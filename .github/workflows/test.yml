name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
  pull_request:

env:
  BUILD_TAG: qbittorrent:test
  CONTAINER_NAME: qbittorrent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          targets: image-local
          set: |
            *.cache-from=type=gha,scope=build-linux-amd64
        env:
          DEFAULT_TAG: ${{ env.BUILD_TAG }}
      -
        name: Start
        run: |
          docker compose up -d
        working-directory: test
        env:
          QBITTORRENT_IMAGE: ${{ env.BUILD_TAG }}
          QBITTORRENT_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Start container
        run: |
          docker rm -f ${CONTAINER_NAME} > /dev/null 2>&1 || true
          docker run -d --name ${CONTAINER_NAME} ${BUILD_TAG}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@9ba6e6f9450baf3b1237f8035c1fdc45932510bd # v1.8.0
        with:
          name: ${{ env.CONTAINER_NAME }}
          log_check: "WebUI will be started shortly"
          timeout: 120
      -
        name: Logs
        if: always()
        run: |
          docker compose logs
        working-directory: test
        env:
          QBITTORRENT_IMAGE: ${{ env.BUILD_TAG }}
          QBITTORRENT_CONTAINER: ${{ env.CONTAINER_NAME }}
